upstream kuyumcu_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name bilezik.zeydozer.com;

    location /.well-known/acme-challenge/ {
        root C:/nginx/acme;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bilezik.zeydozer.com;

    client_max_body_size 25m;

    ssl_certificate C:/nginx/certs/bilezik.zeydozer.com/bilezik.zeydozer.com-chain.pem;
    ssl_certificate_key C:/nginx/certs/bilezik.zeydozer.com/bilezik.zeydozer.com-key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://kuyumcu_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
    }
}
