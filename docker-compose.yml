services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuyumcu-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: kuyumcu-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-kuyumcu}"
      MYSQL_USER: "${MYSQL_USER:-kuyumcu}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-kuyumcu}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  composer_cache:
  db_data:
  vendor:
